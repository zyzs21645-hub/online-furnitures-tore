services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: online_furniture_store_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME:-online_furniture_store}
      DB_USER: ${DB_USER:-store_user}
      DB_PASS: ${DB_PASS:-store_password}
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./admin/uploads:/var/www/html/admin/uploads
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: online_furniture_store_db
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: ${DB_NAME:-online_furniture_store}
      MYSQL_USER: ${DB_USER:-store_user}
      MYSQL_PASSWORD: ${DB_PASS:-store_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  mysql_data:
